<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Play · Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1c20;
  --bg2:#22252a;
  --surface:#2a2d33;
  --card:#2e3138;
  --card-h:#363b44;
  --orange:#f2631a;
  --orange2:#ff7a35;
  --orange-d:rgba(242,99,26,.14);
  --white:#ffffff;
  --off:#ecedf0;
  --muted:#7a8090;
  --muted2:#454a55;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.04);
  --cond:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --r:10px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--off);font-family:var(--body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(242,99,26,.06) 0%,transparent 60%)}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(22,24,28,.97);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.logo-wrap{display:flex;align-items:center;flex-shrink:0;text-decoration:none}
.logo-img{height:42px;width:auto;
  filter:drop-shadow(0 0 8px rgba(242,99,26,.5));
  animation:logo-glow 2.8s ease-in-out infinite;
}
@keyframes logo-glow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(242,99,26,.45)) drop-shadow(0 0 12px rgba(242,99,26,.2))}
  50%{filter:drop-shadow(0 0 14px rgba(242,99,26,.8)) drop-shadow(0 0 28px rgba(242,99,26,.35)) drop-shadow(0 0 40px rgba(255,120,40,.15))}
}

.header-search{flex:1;max-width:400px;position:relative}
.header-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.header-search input{
  width:100%;height:38px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:0 14px 0 38px;
  color:var(--white);font-family:var(--body);font-size:14px;font-weight:500;
  outline:none;transition:border-color .18s;
}
.header-search input:focus{border-color:rgba(242,99,26,.45)}
.header-search input::placeholder{color:var(--muted2)}

.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sel-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:5px 14px;
  font-size:13px;font-weight:600;color:var(--muted);
  transition:border-color .18s;
}
.sel-badge.has{border-color:rgba(242,99,26,.35)}
.sel-badge strong{color:var(--orange);font-size:17px;font-family:var(--cond);font-weight:900}
.btn-primary{
  height:38px;padding:0 18px;
  background:var(--orange);color:#fff;
  border:none;border-radius:8px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:7px;
  transition:background .18s,transform .14s,box-shadow .18s;
  box-shadow:0 2px 12px rgba(242,99,26,.35);white-space:nowrap;
}
.btn-primary:disabled{opacity:.25;pointer-events:none}
.btn-primary:not(:disabled):hover{background:var(--orange2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(242,99,26,.5)}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  background:linear-gradient(135deg,#161820 0%,#251a10 55%,#1a1c20 100%);
  border-bottom:1px solid var(--border);
  padding:52px 32px 48px;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 90% at 85% 50%,rgba(242,99,26,.11) 0%,transparent 65%);
}
.hero-inner{max-width:1200px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:space-between;gap:32px}
.hero-left{max-width:580px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--cond);font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:14px;
}
.hero-eyebrow::before{content:'';width:18px;height:2px;background:var(--orange);border-radius:2px}
.hero h1{
  font-family:var(--cond);font-size:clamp(42px,5vw,68px);
  font-weight:900;font-style:italic;
  text-transform:uppercase;letter-spacing:.5px;
  line-height:.95;color:var(--white);margin-bottom:14px;
}
.hero h1 span{color:var(--orange)}
.hero-sub{font-size:15px;color:var(--muted);line-height:1.65;font-weight:500;max-width:440px}
.hero-stats{display:flex;gap:28px;margin-top:32px;flex-wrap:wrap}
.stat{border-left:2px solid var(--orange);padding-left:14px}
.stat-n{font-family:var(--cond);font-size:38px;font-weight:900;font-style:italic;color:var(--white);line-height:1}
.stat-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* ── TOOLBAR ── */
.toolbar{
  position:relative;z-index:1;
  background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;
}
.toolbar-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
.toolbar-inner::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;height:48px;padding:0 16px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:var(--body);font-size:13px;font-weight:600;
  cursor:pointer;transition:color .16s,border-color .16s;
  white-space:nowrap;display:flex;align-items:center;gap:6px;margin-bottom:-1px;
}
.tab:hover{color:var(--off)}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.tab-n{
  background:var(--surface);border-radius:100px;
  padding:2px 7px;font-size:11px;font-weight:700;color:var(--muted);
  transition:background .16s,color .16s;
}
.tab.on .tab-n{background:var(--orange-d);color:var(--orange)}
.toolbar-right{
  margin-left:auto;padding-left:16px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
}
.vis-count{font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap}
.vis-count strong{color:var(--off)}
.alink{background:none;border:none;color:var(--muted);font-family:var(--body);font-weight:600;font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color .16s;white-space:nowrap}
.alink:hover{color:var(--orange)}

/* ── GRID ── */
.catalog{
  position:relative;z-index:1;
  max-width:1200px;margin:0 auto;
  padding:28px 32px 120px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:14px;
}

/* ── CARD ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  position:relative;display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.13);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.card.selected{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 6px 24px rgba(242,99,26,.22)}

.card-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#1a1d22}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s,filter .25s}
.card:hover .card-thumb img{transform:scale(1.06);filter:brightness(.75)}
.card-thumb-empty{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#252830,#1a1d22);display:flex;align-items:center;justify-content:center;color:var(--muted2)}

.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;background:rgba(0,0,0,.3)}
.card:hover .play-overlay{opacity:1}
.play-circle{
  width:40px;height:40px;border-radius:50%;
  background:rgba(242,99,26,.92);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 16px rgba(0,0,0,.5);
  transform:scale(.8);transition:transform .18s;
}
.card:hover .play-circle{transform:scale(1)}

.card-num{
  position:absolute;top:7px;left:7px;
  background:rgba(0,0,0,.62);backdrop-filter:blur(4px);
  border-radius:5px;padding:2px 7px;
  font-family:var(--cond);font-size:12px;font-weight:800;
  color:rgba(255,255,255,.88);line-height:1.4;
}
.card.selected .card-num{background:var(--orange);color:#fff}

.natal-badge{
  position:absolute;top:7px;right:34px;
  background:rgba(0,0,0,.62);backdrop-filter:blur(4px);
  border-radius:5px;padding:2px 6px;
  font-size:9px;font-weight:700;color:var(--orange);
  letter-spacing:.05em;text-transform:uppercase;
}
.card-check{
  position:absolute;top:7px;right:7px;
  width:21px;height:21px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  background:transparent;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.card.selected .card-check{background:var(--orange);border-color:var(--orange)}
.card-check svg{opacity:0;transition:opacity .15s}
.card.selected .card-check svg{opacity:1}

.card-body{padding:11px 11px 13px;flex:1}
.card-title{
  font-family:var(--cond);font-size:14px;font-weight:800;
  text-transform:uppercase;letter-spacing:.02em;
  color:var(--white);line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .15s;
}
.card.selected .card-title{color:var(--orange)}
.card-artist{
  font-size:11px;font-weight:600;color:var(--muted);
  margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.03em;text-transform:uppercase;
}

/* ── EMPTY ── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty p{font-family:var(--cond);font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:12px}

/* ── FLOAT BAR ── */
.fbar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(24px);
  z-index:500;background:var(--bg2);border:1px solid var(--border);
  border-radius:100px;padding:8px 8px 8px 24px;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 12px 40px rgba(0,0,0,.55);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;
}
.fbar.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.fbar-txt{font-size:14px;font-weight:600;color:var(--muted)}
.fbar-txt strong{font-family:var(--cond);font-size:20px;font-weight:900;color:var(--orange);vertical-align:middle}
.btn-fbar{
  height:40px;padding:0 22px;background:var(--orange);color:#fff;
  border:none;border-radius:100px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:8px;transition:background .16s;
}
.btn-fbar:hover{background:var(--orange2)}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:700;
  background:rgba(12,14,17,.87);backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:auto}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-bottom:none;
  border-radius:20px 20px 0 0;width:100%;max-width:560px;
  padding:32px 32px 44px;
  transform:translateY(32px);transition:transform .3s cubic-bezier(.4,.2,.2,1);
}
.overlay.open .modal{transform:translateY(0)}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
.modal h2{
  font-family:var(--cond);font-size:30px;font-weight:900;font-style:italic;
  text-transform:uppercase;letter-spacing:.5px;color:var(--white);margin-bottom:4px;
}
.modal h2 span{color:var(--orange)}
.modal-sub{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:20px}
.mlist{
  background:var(--surface);border-radius:10px;
  max-height:280px;overflow-y:auto;margin-bottom:20px;
  scrollbar-width:thin;scrollbar-color:var(--muted2) transparent;
}
.mitem{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border2);font-size:13px}
.mitem:last-child{border-bottom:none}
.mitem-n{font-family:var(--cond);font-size:16px;font-weight:900;color:var(--orange);min-width:28px}
.mitem-title{font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mitem-artist{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.mbtns{display:flex;gap:10px;flex-wrap:wrap}
.btn-wpp{
  flex:1;height:48px;padding:0 20px;background:#25d366;color:#fff;
  border:none;border-radius:10px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .18s;
}
.btn-wpp:hover{opacity:.88}
.btn-cls{
  height:48px;padding:0 20px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);border-radius:10px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:14px;transition:border-color .18s,color .18s;
}
.btn-cls:hover{border-color:rgba(255,255,255,.2);color:var(--off)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  header{padding:0 16px}
  .header-search{max-width:none;flex:1}
  .hero{padding:36px 16px}
  .toolbar{padding:0 16px}
  .catalog{padding:20px 16px 100px;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .modal{padding:24px 20px 36px}
  .hero-stats{gap:20px}
  .sel-badge span:last-child{display:none}
}
@media(max-width:480px){
  .catalog{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:38px}
}
</style>
</head>

const tabDefs=[
  {l:"Todas",k:"all"},{l:"Natal 🎄",k:"natal"},{l:"FHOP Music",k:"fhop"},
  {l:"Fernandinho",k:"fern"},{l:"Gabriela Rocha",k:"gabr"},{l:"Morada",k:"mora"},
  {l:"Aline Barros",k:"alin"},{l:"Nívea Soares",k:"nive"},{l:"Felipe Rodrigues",k:"felip"},
  {l:"Israel Salazar",k:"isra"},{l:"Gabi Sampaio",k:"gabi"},{l:"Theo Rubia",k:"theo"},
];
function mF(s,k){
  if(k==='all')return true;if(k==='natal')return!!s.x;
  const a=s.a.toUpperCase();
  const m={fhop:'FHOP',fern:'FERNANDINHO',gabr:'GABRIELA ROCHA',mora:'MORADA',
    alin:'ALINE BARROS',felip:'FELIPE RODRIGUES',isra:'ISRAEL SALAZAR',
    gabi:'GABI SAMPAIO',theo:'THEO RUBIA'};
  if(m[k])return a.includes(m[k]);
  if(k==='nive')return a.includes('NÍV')||a.includes('NIV');
  return true;
}

const sel=new Set();
let activeF='all',vis=[...songs];

function buildTabs(){
  const w=document.getElementById('tabs');
  w.style.cssText='display:flex;align-items:center;';
  tabDefs.forEach(f=>{
    const c=songs.filter(s=>mF(s,f.k)).length;
    if(!c&&f.k!=='all')return;
    const b=document.createElement('button');
    b.className='tab'+(f.k==='all'?' on':'');
    b.innerHTML=`${f.l}<span class="tab-n">${c}</span>`;
    b.onclick=()=>{activeF=f.k;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');filter();};
    w.appendChild(b);
  });
}

function filter(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  vis=songs.filter(s=>mF(s,activeF)&&(!q||s.t.toLowerCase().includes(q)||s.a.toLowerCase().includes(q)));
  document.getElementById('visCnt').textContent=vis.length;
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  if(!vis.length){g.innerHTML='<div class="empty"><p>Nenhuma música encontrada</p></div>';return;}
  g.innerHTML=vis.map(s=>{
    const yt=ytLinks[s.n]||'';
    const th=covers[s.n]
      ?`<div class="card-thumb" onclick="event.stopPropagation();${yt?`window.open('${yt}','_blank')`:'void(0)'}">
          <img src="${covers[s.n]}" alt="${s.t}" loading="lazy">
          <div class="play-overlay"><div class="play-circle"><svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div></div>
        </div>`
      :`<div class="card-thumb-empty" onclick="event.stopPropagation();${yt?`window.open('${yt}','_blank')`:'void(0)'}">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><polygon points="10,8 16,12 10,16"/></svg>
        </div>`;
    return `<div class="card${sel.has(s.n)?' selected':''}" onclick="toggle(${s.n})" data-n="${s.n}">
      ${th}
      <span class="card-num">${s.n}</span>
      ${s.x?'<span class="natal-badge">Natal</span>':''}
      <div class="card-check"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="card-body">
        <div class="card-title">${s.t}</div>
        <div class="card-artist">${s.a}</div>
      </div>
    </div>`;
  }).join('');
}

function toggle(n){
  sel.has(n)?sel.delete(n):sel.add(n);
  document.querySelector(`.card[data-n="${n}"]`)?.classList.toggle('selected',sel.has(n));
  updateUI();
}
function selAll(){vis.forEach(s=>sel.add(s.n));renderGrid();updateUI();}
function clrAll(){sel.clear();renderGrid();updateUI();}
function updateUI(){
  const c=sel.size;
  document.getElementById('navCount').textContent=c;
  document.getElementById('navBtn').disabled=c===0;
  document.getElementById('fbarCnt').textContent=c;
  document.getElementById('fbar').classList.toggle('show',c>0);
  document.getElementById('selBadge').classList.toggle('has',c>0);
}

function openModal(){
  if(!sel.size)return;
  const s=[...sel].sort((a,b)=>a-b);
  document.getElementById('msub').textContent=`${s.length} música${s.length>1?'s':''} selecionada${s.length>1?'s':''} — confirme e envie!`;
  document.getElementById('mlist').innerHTML=s.map(n=>{
    const sg=songs.find(x=>x.n===n);
    return `<div class="mitem"><span class="mitem-n">${n}</span><div><div class="mitem-title">${sg.t}</div><div class="mitem-artist">${sg.a}</div></div></div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function outsideClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function sendWpp(){
  const s=[...sel].sort((a,b)=>a-b);
  const lines=s.map(n=>{const sg=songs.find(x=>x.n===n);return`${n}. ${sg.t} — ${sg.a}`;}); 
  const msg=`Olá! Seguem as músicas que gostaria para o meu pack de Slides Animados:\n\n${lines.join('\n')}\n\nTotal: ${s.length} música${s.length>1?'s':''}`;
  // ← Substitua pelo número real (ex: 5551999999999)
  window.open(`https://wa.me/5500000000000?text=${encodeURIComponent(msg)}`,'_blank');
}
